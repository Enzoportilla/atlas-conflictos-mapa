<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATLAS DE CONFLICTOS — Mapa de Noticias Global</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">

<style>
  :root {
    --ink: #0d0d0d;
    --paper: #f5f0e8;
    --cream: #ede8dc;
    --red: #c0392b;
    --amber: #e67e22;
    --blue: #1a3a5c;
    --gold: #b8960c;
    --muted: #7a7265;
    --border: rgba(13,13,13,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--ink);
    color: var(--paper);
    height: 100vh;
    overflow: hidden;
  }

  /* ─── HEADER ─── */
  #header {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 56px;
    background: var(--ink);
    border-bottom: 2px solid var(--red);
  }

  #header .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    font-weight: 900;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--paper);
  }

  #header .logo span { color: var(--red); }

  #header .tagline {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  #header .update-time {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: var(--gold);
    letter-spacing: 0.1em;
  }

  #rss-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  #rss-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.4s;
  }
  #rss-dot.online  { background: #27ae60; box-shadow: 0 0 6px #27ae6088; animation: blink 2s infinite; }
  #rss-dot.offline { background: #c0392b; }
  #rss-label { color: var(--muted); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ─── MAP ─── */
  #map {
    position: absolute;
    top: 56px; bottom: 0; left: 0; right: 0;
    z-index: 1;
  }

  .leaflet-container {
    background: #1a2535 !important;
    font-family: 'IBM Plex Sans', sans-serif;
  }

  /* ─── LEGEND ─── */
  #legend {
    position: absolute;
    bottom: 32px;
    left: 24px;
    z-index: 1000;
    background: rgba(13,13,13,0.92);
    border: 1px solid var(--border);
    border-left: 3px solid var(--gold);
    padding: 14px 18px;
    min-width: 180px;
  }

  #legend h4 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
    font-size: 0.72rem;
    color: var(--paper);
  }

  .legend-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
    border: 2px solid rgba(255,255,255,0.3);
  }

  /* ─── FILTERS ─── */
  #filters {
    position: absolute;
    top: 72px;
    right: 24px;
    z-index: 1000;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .filter-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 6px 12px;
    border: 1px solid currentColor;
    background: rgba(13,13,13,0.85);
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .filter-btn .dot { width: 8px; height: 8px; border-radius: 50%; }
  .filter-btn.war { color: #c0392b; }
  .filter-btn.political { color: #3498db; }
  .filter-btn.economic { color: #f39c12; }
  .filter-btn.social { color: #27ae60; }
  .filter-btn.inactive { opacity: 0.3; }
  .filter-btn:hover { opacity: 0.85; }

  /* ─── POPUP / VIÑETA ─── */
  .leaflet-popup-content-wrapper {
    background: var(--ink) !important;
    border: none !important;
    border-radius: 0 !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.7) !important;
    padding: 0 !important;
    min-width: 360px;
    max-width: 480px;
  }

  .leaflet-popup-content {
    margin: 0 !important;
    color: var(--paper);
  }

  .leaflet-popup-tip-container { display: none; }

  .popup-inner {
    position: relative;
    overflow: hidden;
  }

  .popup-category-bar {
    height: 4px;
    width: 100%;
  }

  .popup-body {
    padding: 18px 20px 16px;
  }

  .popup-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }

  .popup-category-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 2px 7px;
    border: 1px solid currentColor;
  }

  .popup-date {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.58rem;
    color: var(--muted);
  }

  .popup-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 10px;
    color: var(--paper);
  }

  .popup-summary {
    font-size: 0.78rem;
    line-height: 1.65;
    color: rgba(245,240,232,0.8);
    margin-bottom: 14px;
  }

  /* ─── NOTICIAS RSS ─── */
  .popup-news-list {
    margin-bottom: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-height: 420px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--muted) transparent;
    padding-right: 4px;
  }

  .popup-news-list::-webkit-scrollbar { width: 4px; }
  .popup-news-list::-webkit-scrollbar-track { background: transparent; }
  .popup-news-list::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 2px; }

  .news-item {
    padding: 9px 10px;
    background: rgba(255,255,255,0.04);
    border-left: 2px solid rgba(255,255,255,0.12);
  }

  .news-title {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--paper);
    text-decoration: none;
    line-height: 1.35;
    margin-bottom: 4px;
    transition: color 0.15s;
  }

  .news-title:hover { color: var(--gold); text-decoration: underline; }

  .news-snippet {
    font-size: 0.72rem;
    line-height: 1.5;
    color: rgba(245,240,232,0.6);
    margin-bottom: 5px;
  }

  .news-meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.58rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .popup-status {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem;
    padding: 4px 8px;
    margin-bottom: 10px;
    letter-spacing: 0.06em;
  }
  .popup-status.online  { color: #27ae60; background: rgba(39,174,96,0.08); border: 1px solid rgba(39,174,96,0.2); }
  .popup-status.offline { color: #e67e22; background: rgba(230,126,34,0.08); border: 1px solid rgba(230,126,34,0.2); }

  .popup-region {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.58rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .news-title-plain {
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--paper);
    line-height: 1.35;
    margin-bottom: 4px;
  }

  .popup-sources {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    padding-top: 10px;
    border-top: 1px solid rgba(255,255,255,0.08);
  }

  .source-chip {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.56rem;
    color: var(--muted);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 2px 6px;
    letter-spacing: 0.1em;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    transition: color 0.15s, border-color 0.15s;
  }

  .source-chip:hover {
    color: var(--gold);
    border-color: var(--gold);
  }

  .source-chip::after {
    content: '↗';
    font-size: 0.5rem;
    opacity: 0.6;
  }

  .popup-loading {
    padding: 30px 20px;
    text-align: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .popup-loading .spinner {
    display: inline-block;
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.1);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 10px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── MARKER STYLES ─── */
  .custom-marker {
    position: relative;
    cursor: pointer;
  }

  .marker-pulse {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    animation: pulse 2s ease-out infinite;
    opacity: 0;
  }

  @keyframes pulse {
    0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0.8; }
    100% { transform: translate(-50%, -50%) scale(3); opacity: 0; }
  }

  /* ─── COUNTER ─── */
  #counter {
    position: absolute;
    bottom: 32px;
    right: 24px;
    z-index: 1000;
    background: rgba(13,13,13,0.92);
    border: 1px solid var(--border);
    border-right: 3px solid var(--red);
    padding: 12px 16px;
    text-align: right;
  }

  #counter .count-number {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 900;
    color: var(--red);
    line-height: 1;
  }

  #counter .count-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 2px;
  }

  /* ─── TOOLTIP ─── */
  .leaflet-tooltip {
    background: var(--ink) !important;
    border: 1px solid var(--gold) !important;
    border-radius: 0 !important;
    color: var(--paper) !important;
    font-family: 'IBM Plex Mono', monospace !important;
    font-size: 0.65rem !important;
    padding: 4px 8px !important;
    letter-spacing: 0.05em !important;
    box-shadow: none !important;
  }

  .leaflet-tooltip::before { display: none !important; }

  /* ─── LOADING OVERLAY ─── */
  #loading-overlay {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: var(--ink);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    transition: opacity 0.5s;
  }

  #loading-overlay .logo-big {
    font-family: 'Playfair Display', serif;
    font-size: 2.5rem;
    font-weight: 900;
    letter-spacing: 0.2em;
    color: var(--paper);
  }

  #loading-overlay .logo-big span { color: var(--red); }

  #loading-overlay .load-bar {
    width: 280px;
    height: 2px;
    background: rgba(255,255,255,0.1);
    position: relative;
    overflow: hidden;
  }

  #loading-overlay .load-bar::after {
    content: '';
    position: absolute;
    left: -40%;
    width: 40%;
    height: 100%;
    background: var(--red);
    animation: loadbar 1.2s ease-in-out infinite;
  }

  @keyframes loadbar {
    to { left: 100%; }
  }

  #loading-overlay .load-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.3em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<!-- Loading Overlay -->
<div id="loading-overlay">
  <div class="logo-big">ATLAS<span>.</span></div>
  <div class="load-bar"></div>
  <div class="load-text">Cargando mapa global...</div>
</div>

<!-- Header -->
<div id="header">
  <div class="logo">ATLAS <span>DE CONFLICTOS</span></div>
  <div class="tagline">Noticias geopolíticas en tiempo real</div>
  <div style="display:flex;align-items:center;gap:16px;">
    <div id="rss-status">
      <div id="rss-dot"></div>
      <span id="rss-label">RSS</span>
    </div>
    <div class="update-time" id="update-time">—</div>
  </div>
</div>

<!-- Filters -->
<div id="filters">
  <button class="filter-btn war active" data-cat="war" onclick="toggleFilter('war', this)">
    <span class="dot" style="background:#c0392b"></span> Conflictos bélicos
  </button>
  <button class="filter-btn political active" data-cat="political" onclick="toggleFilter('political', this)">
    <span class="dot" style="background:#3498db"></span> Política
  </button>
  <button class="filter-btn economic active" data-cat="economic" onclick="toggleFilter('economic', this)">
    <span class="dot" style="background:#f39c12"></span> Economía
  </button>
  <button class="filter-btn social active" data-cat="social" onclick="toggleFilter('social', this)">
    <span class="dot" style="background:#27ae60"></span> Social / Sociedad
  </button>
</div>

<!-- Legend -->
<div id="legend">
  <h4>Categorías</h4>
  <div class="legend-item"><div class="legend-dot" style="background:#c0392b"></div> Conflicto bélico</div>
  <div class="legend-item"><div class="legend-dot" style="background:#3498db"></div> Crisis política</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f39c12"></div> Economía</div>
  <div class="legend-item"><div class="legend-dot" style="background:#27ae60"></div> Social / Sociedad</div>
</div>

<!-- Counter -->
<div id="counter">
  <div class="count-number" id="event-count">0</div>
  <div class="count-label">eventos activos</div>
</div>

<!-- Map -->
<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const CLAUDE_API_URL = "https://api.anthropic.com/v1/messages";

const CATEGORY_CONFIG = {
  war:       { color: '#c0392b', label: 'Conflicto bélico', tag: 'GUERRA' },
  political: { color: '#3498db', label: 'Crisis política',   tag: 'POLÍTICA' },
  economic:  { color: '#f39c12', label: 'Economía',          tag: 'ECONOMÍA' },
  social:    { color: '#27ae60', label: 'Social',            tag: 'SOCIAL' },
};

// ─── EVENTOS GLOBALES ACTUALES ────────────────────────────────────────────────
// Datos curados con los principales conflictos y noticias del mundo (marzo 2025)
const EVENTS = [
  // CONFLICTOS BÉLICOS
  { id: 1, lat: 48.5,   lng: 31.2,   category: 'war',       title: 'Guerra Rusia–Ucrania', country: 'Ucrania', region: 'Europa del Este',
    sources: [

  { id: 2, lat: 31.5,   lng: 34.8,   category: 'war',       title: 'Conflicto Gaza – Israel', country: 'Gaza/Israel', region: 'Oriente Medio',

      { name: 'BBC',        url: 'https://www.bbc.com/news/world/middle_east' },
      { name: 'Al Jazeera', url: 'https://www.aljazeera.com/where/palestine/' },

  { id: 5, lat: 15.3,   lng: 44.2,   category: 'war',       title: 'Conflicto en Yemen', country: 'Yemen', region: 'Oriente Medio',
    sources: [
      { name: 'BBC',        url: 'https://www.bbc.com/news/world/middle_east' },

  // POLÍTICA

      { name: 'BBC',          url: 'https://www.bbc.com/news/world/us_and_canada' },

  { id: 10, lat: -33.45, lng: -70.67, category: 'political', title: 'Chile: Crisis política y seguridad', country: 'Chile', region: 'Sudamérica',
    sources: [
      { name: 'Cooperativa', url: 'https://www.cooperativa.cl/noticias/pais/' },
      { name: 'CIPER Chile',  url: 'https://www.ciperchile.cl/' },
      { name: 'BioBioChile',  url: 'https://www.biobiochile.cl/' },
      { name: 'The Clinic',   url: 'https://www.theclinic.cl/' },

// ─── ESTADO ────────────────────────────────────────────────────────────────────
let map;
let markers = {};
let activeFilters = new Set(['war', 'political', 'economic', 'social']);
let markerLayers = {};

// ─── MAPA ──────────────────────────────────────────────────────────────────────
function initMap() {
  map = L.map('map', {
    center: [20, 10],
    zoom: 3,
    minZoom: 2,
    maxZoom: 14,
    zoomControl: false,
  });

  // Tile layer oscuro / cartográfico
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://carto.com/">CARTO</a> &copy; OpenStreetMap',
    maxZoom: 19
  }).addTo(map);

  L.control.zoom({ position: 'bottomright' }).addTo(map);

  // Crear marcadores
  EVENTS.forEach(event => createMarker(event));
  updateCounter();
}

// ─── MARCADORES ────────────────────────────────────────────────────────────────
function createMarker(event) {
  const cfg = CATEGORY_CONFIG[event.category];

  const size = event.category === 'war' ? 22 : 16;
  const pulseSize = size + 10;

  const icon = L.divIcon({
    className: '',
    html: `
      <div class="custom-marker" style="width:${size}px;height:${size}px;position:relative;">
        <div class="marker-pulse" style="width:${pulseSize}px;height:${pulseSize}px;background:${cfg.color};top:50%;left:50%;"></div>
        <div style="
          width:${size}px;height:${size}px;border-radius:50%;
          background:${cfg.color};
          border:2px solid rgba(255,255,255,0.7);
          box-shadow:0 0 12px ${cfg.color}88;
          position:relative;z-index:2;
        "></div>
      </div>
    `,
    iconSize: [size, size],
    iconAnchor: [size/2, size/2],
  });

  const marker = L.marker([event.lat, event.lng], { icon })
    .addTo(map)
    .bindTooltip(event.title, { permanent: false, direction: 'top', offset: [0, -12] })
    .on('click', () => openPopup(event, marker));

  if (!markerLayers[event.category]) markerLayers[event.category] = [];
  markerLayers[event.category].push(marker);
  markers[event.id] = marker;
}

// ─── CONFIGURACIÓN RSS ────────────────────────────────────────────────────────
const RSS_SERVER = 'https://atlas-rss-server-production.up.railway.app';
let rssOnline = false;

// Verifica conexión al servidor RSS cada 15 segundos
async function checkRSSServer() {
  try {
    const res = await fetch(`${RSS_SERVER}/status`, { signal: AbortSignal.timeout(3000) });
    rssOnline = res.ok;
  } catch {
    rssOnline = false;
  }
  const dot   = document.getElementById('rss-dot');
  const label = document.getElementById('rss-label');
  if (dot && label) {
    dot.className   = rssOnline ? 'online' : 'offline';
    label.textContent = rssOnline ? 'RSS en vivo' : 'RSS offline';
    label.style.color = rssOnline ? '#27ae60' : '#c0392b';
  }
}

// ─── POPUP ────────────────────────────────────────────────────────────────────
async function openPopup(event, marker) {
  const cfg = CATEGORY_CONFIG[event.category];
  const today = new Date().toLocaleDateString('es-CL', { day:'numeric', month:'long', year:'numeric' });

  // Spinner mientras carga
  L.popup({ maxWidth: 460, closeButton: true, className: 'atlas-popup' })
    .setLatLng([event.lat, event.lng])
    .setContent(`
      <div class="popup-inner">
        <div class="popup-category-bar" style="background:${cfg.color}"></div>
        <div class="popup-loading">
          <div class="spinner"></div>
          <div>${rssOnline ? 'Leyendo feeds en tiempo real…' : 'Cargando contexto editorial…'}</div>
        </div>
      </div>`)
    .openOn(map);

  const { items, isFallback, total } = await fetchRSSNews(event);

  const itemsHTML = items.map(item => {
    const date = item.date
      ? new Date(item.date).toLocaleDateString('es-CL', { day:'numeric', month:'short', year:'numeric' })
      : '';
    const snippet = (item.summary || '').replace(/<[^>]*>/g, '').slice(0, 180);
    const link = item.link
      ? `<a class="news-title" href="${item.link}" target="_blank" rel="noopener noreferrer">${item.title} ↗</a>`
      : `<div class="news-title-plain">${item.title}</div>`;
    return `
      <div class="news-item">
        ${link}
        ${snippet ? `<div class="news-snippet">${snippet}…</div>` : ''}
        <div class="news-meta">${item.source || ''}${date ? ' · ' + date : ''}</div>
      </div>`;
  }).join('');

  const statusBar = isFallback
    ? `<div class="popup-status offline">⚠ Servidor RSS offline — ejecuta: node rss-server.js</div>`
    : `<div class="popup-status online">● ${total} noticias en vivo · ${today}</div>`;

  const sourceChips = event.sources
    .map(s => `<a class="source-chip" href="${s.url}" target="_blank" rel="noopener noreferrer">${s.name} ↗</a>`)
    .join('');

  // Reemplazar contenido del popup abierto
  const existing = document.querySelector('.leaflet-popup-content');
  if (existing) {
    existing.innerHTML = `
      <div class="popup-inner">
        <div class="popup-category-bar" style="background:${cfg.color}"></div>
        <div class="popup-body">
          <div class="popup-meta">
            <span class="popup-category-tag" style="color:${cfg.color};border-color:${cfg.color}">${cfg.tag}</span>
            <span class="popup-region">${event.region}</span>
          </div>
          <div class="popup-title">${event.title}</div>
          ${statusBar}
          <div class="popup-news-list">${itemsHTML}</div>
          <div class="popup-sources">${sourceChips}</div>
        </div>
      </div>`;
    // Forzar reposición del popup
    map.invalidateSize();
  }
}

// ─── FETCH RSS ────────────────────────────────────────────────────────────────
async function fetchRSSNews(event) {
  try {
    const res = await fetch(`${RSS_SERVER}/news?event=${event.id}&limit=30`, {
      signal: AbortSignal.timeout(8000)
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (!data.items?.length) throw new Error('Sin artículos');
    rssOnline = true;
    return { items: data.items, isFallback: false, total: data.total || data.items.length };
  } catch (err) {
    rssOnline = false;
    console.warn('RSS:', err.message);
    // Fallback editorial
    return {
      items: [{ title: event.title, summary: event.summary, link: '', date: '', source: 'Resumen editorial' }],
      isFallback: true,
      total: 0
    };
  }
}

// ─── FILTROS ───────────────────────────────────────────────────────────────────
function toggleFilter(cat, btn) {
  if (activeFilters.has(cat)) {
    activeFilters.delete(cat);
    btn.classList.add('inactive');
    (markerLayers[cat] || []).forEach(m => m.setOpacity(0.12));
  } else {
    activeFilters.add(cat);
    btn.classList.remove('inactive');
    (markerLayers[cat] || []).forEach(m => m.setOpacity(1));
  }
  updateCounter();
}

function updateCounter() {
  let count = 0;
  activeFilters.forEach(cat => {
    count += (markerLayers[cat] || []).length;
  });
  document.getElementById('event-count').textContent = count;
}

// ─── RELOJ ─────────────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const str = now.toLocaleString('es-CL', {
    day: '2-digit', month: 'short', year: 'numeric',
    hour: '2-digit', minute: '2-digit', timeZone: 'America/Santiago'
  });
  document.getElementById('update-time').textContent = `${str} CLT`;
}

// ─── INIT ──────────────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  setTimeout(() => {
    initMap();
    updateClock();
    setInterval(updateClock, 30000);
    checkRSSServer();
    setInterval(checkRSSServer, 15000);

    const overlay = document.getElementById('loading-overlay');
    overlay.style.opacity = '0';
    setTimeout(() => overlay.style.display = 'none', 500);
  }, 1400);
});
</script>
